version: '3.8'

services:
  webnote:
    container_name: webnote_app
    build: .
    ports:
      - "3000:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}}
      # Optional integrations
      N8N_API_KEY: ${N8N_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_VERTEX_PROJECT: ${GOOGLE_VERTEX_PROJECT:-}
      GOOGLE_VERTEX_LOCATION: ${GOOGLE_VERTEX_LOCATION:-}
    networks:
      - webnote_network
    restart: unless-stopped

  postgres:
    container_name: webnote_postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - webnote_postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - webnote_network
    restart: unless-stopped

volumes:
  webnote_postgres_data:

networks:
  webnote_network:
    name: webnote_network
    driver: bridge
